<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url={{ page.redirect_to | relative_url }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Opening {{ page.title }}</title>
    <script>
      window.location.replace("{{ page.redirect_to | relative_url }}");
    </script>
  </head>
  <body>
    <p><a href="{{ page.redirect_to | relative_url }}">Open {{ page.title }}</a></p>
  </body>
</html>
